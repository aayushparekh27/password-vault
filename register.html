<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — My Vault</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div id="toast-container"></div>

    <nav class="navbar">
        <a class="logo" href="index.html" style="text-decoration:none;">
            <span class="logo-icon">🔐</span> My Vault
        </a>
        <div class="nav-links">
            <a href="login.html" class="btn btn-outline btn-sm">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create your vault</h2>
            <p class="auth-subtitle">Start storing passwords securely for free</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" required placeholder="Choose a strong password" autocomplete="new-password">
                        <button type="button" class="toggle-pw" tabindex="-1">👁️</button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrap">
                        <input type="password" id="confirmPassword" required placeholder="Repeat your password" autocomplete="new-password">
                        <button type="button" class="toggle-pw" tabindex="-1">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:4px;">Create Account</button>
            </form>

            <p class="auth-link" style="margin-top:20px;">Already have an account? <a href="login.html">Login here</a></p>
            <p class="auth-link">Back to <a href="index.html">Home</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
